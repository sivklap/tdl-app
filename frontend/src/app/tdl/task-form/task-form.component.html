<div class="task-form-card">
  <h2 class="task-form-title">Add Task</h2>

  <div class="form-group">
    <label>Title</label>
    <input [(ngModel)]="title" placeholder="Task title" />
  </div>

  <div class="form-group">
    <label>Description</label>
    <textarea [(ngModel)]="description" rows="2" placeholder="Task description"></textarea>
  </div>

  <div class="form-group">
    <label>Due date</label>
    <input [(ngModel)]="dueDate" type="datetime-local" />
  </div>

  <button class="add-btn" (click)="onAdd()">Add Task</button>
</div>
