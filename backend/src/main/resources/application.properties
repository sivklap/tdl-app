spring.application.name=tdl-backend

# H2 in-memory database (so the app can run without any setup)
spring.datasource.url=jdbc:h2:mem:tdl_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Handy in-browser DB viewer for debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console